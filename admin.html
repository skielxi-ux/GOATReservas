<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT ESPORTS — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--green:#3ddc68;--bg:#060d14;--card:rgba(255,255,255,0.04);--text:#fff;--dim:rgba(255,255,255,0.45);--border:rgba(255,255,255,0.1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(26,106,255,0.2) 0%,transparent 60%),
               radial-gradient(ellipse 60% 50% at 90% 80%,rgba(61,220,104,0.15) 0%,transparent 55%);}
  .hdr{position:relative;z-index:10;background:rgba(6,13,20,0.95);border-bottom:1px solid var(--border);
    padding:16px 32px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .hdr-title{font-size:0.7rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--green);}
  .hdr-sub{font-size:0.72rem;color:var(--dim);margin-top:2px;}
  .btn-ref{padding:8px 20px;background:rgba(61,220,104,0.1);border:1px solid rgba(61,220,104,0.3);
    border-radius:8px;color:var(--green);font-family:'Montserrat',sans-serif;font-size:0.7rem;
    font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
  .btn-ref:hover{background:rgba(61,220,104,0.2);}
  .main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px 80px;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 20px;}
  .slbl{font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
  .sval{font-size:1.8rem;font-weight:900;}
  .sval.g{color:var(--green);}.sval.y{color:#ffd700;}.sval.b{color:#4da6ff;}
  .sec{font-size:0.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green);
    margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .sec::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(61,220,104,0.3),transparent);}
  .gnav-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:12px;}
  .dlbl{font-size:0.88rem;font-weight:700;color:#fff;min-width:160px;text-align:center;}
  .gbtn{width:32px;height:32px;background:rgba(255,255,255,0.06);border:1px solid var(--border);
    border-radius:8px;color:var(--dim);font-size:1.1rem;cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;transition:all 0.2s;}
  .gbtn:hover{background:rgba(61,220,104,0.1);border-color:rgba(61,220,104,0.4);color:var(--green);}
  .hbtn{padding:7px 16px;background:rgba(61,220,104,0.1);border:1px solid rgba(61,220,104,0.3);
    border-radius:8px;color:var(--green);font-family:'Montserrat',sans-serif;font-size:0.65rem;
    font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
  .hbtn:hover{background:rgba(61,220,104,0.2);}
  .gwrap{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;overflow:hidden;overflow-x:auto;margin-bottom:40px;}
  .gt{width:100%;border-collapse:collapse;min-width:620px;}
  .gt thead th{padding:14px 10px;text-align:center;font-size:0.58rem;font-weight:700;
    letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);border-right:1px solid rgba(255,255,255,0.05);}
  .gt thead th:first-child{width:72px;color:var(--dim);background:rgba(255,255,255,0.02);}
  .th1{color:#4da6ff;}.th2{color:#3ddc68;}.th3{color:#ffd700;}.th4{color:#ff8c42;}
  .gt tbody tr:hover{background:rgba(255,255,255,0.015);}
  .gt tbody td{border-bottom:1px solid rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.04);
    padding:6px 8px;vertical-align:top;height:60px;width:22%;}
  .gt tbody td:first-child{background:rgba(255,255,255,0.02);border-right:1px solid var(--border);
    text-align:center;font-size:0.72rem;font-weight:700;color:var(--dim);vertical-align:middle;}
  .gt tbody td:last-child{border-right:none;}
  .gt tbody tr:last-child td{border-bottom:none;}
  .cfree{text-align:center;color:rgba(255,255,255,0.07);font-size:0.7rem;padding-top:18px;}
  .cb{border-radius:8px;padding:6px 9px;height:100%;}
  .cb1{background:rgba(26,106,255,0.15);border:1px solid rgba(26,106,255,0.3);}
  .cb2{background:rgba(61,220,104,0.12);border:1px solid rgba(61,220,104,0.3);}
  .cb3{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3);}
  .cb4{background:rgba(255,140,66,0.12);border:1px solid rgba(255,140,66,0.3);}
  .cc{border-radius:0 6px 6px 0;padding:4px 8px;height:100%;}
  .cc1{background:rgba(26,106,255,0.06);border-left:2px solid rgba(26,106,255,0.4);}
  .cc2{background:rgba(61,220,104,0.06);border-left:2px solid rgba(61,220,104,0.4);}
  .cc3{background:rgba(255,215,0,0.06);border-left:2px solid rgba(255,215,0,0.4);}
  .cc4{background:rgba(255,140,66,0.06);border-left:2px solid rgba(255,140,66,0.4);}
  .bn{font-size:0.72rem;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bt{font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.65);margin-top:3px;}
  .bd{font-size:0.6rem;color:var(--dim);margin-top:1px;}
  .bcl{font-size:0.6rem;color:rgba(255,255,255,0.22);padding-top:8px;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">GOAT ESPORTS — Panel Admin</div>
    <div class="hdr-sub" id="sub">Cargando...</div>
  </div>
  <button class="btn-ref" onclick="loadData()">&#8635; Actualizar</button>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="slbl">Total reservas</div><div class="sval" id="st">&#8212;</div></div>
    <div class="stat"><div class="slbl" id="lh">Reservas del d&#237;a</div><div class="sval g" id="sh">&#8212;</div></div>
    <div class="stat"><div class="slbl">Ingresos totales</div><div class="sval y" id="si">&#8212;</div></div>
    <div class="stat"><div class="slbl" id="lih">Ingresos del d&#237;a</div><div class="sval b" id="sih">&#8212;</div></div>
    <div class="stat"><div class="slbl" id="lmes">Reservas del mes</div><div class="sval g" id="smes">&#8212;</div></div>
    <div class="stat"><div class="slbl" id="lgmes">Ganancia del mes</div><div class="sval y" id="sgmes">&#8212;</div></div>
  </div>

  <div class="sec">&#128197; Grilla del d&#237;a</div>
  <div class="gnav-row">
    <button class="gbtn" onclick="changeDay(-1)">&#8249;</button>
    <div class="dlbl" id="dlbl">&#8212;</div>
    <button class="gbtn" onclick="changeDay(1)">&#8250;</button>
    <button class="hbtn" onclick="goToday()">Hoy</button>
  </div>
  <div class="gwrap">
    <table class="gt">
      <thead><tr>
        <th></th>
        <th class="th1">&#127918; Est. 1<br><span style="font-weight:400;font-size:0.52rem;color:var(--dim)">PlayStation 5</span></th>
        <th class="th2">&#127918; Est. 2<br><span style="font-weight:400;font-size:0.52rem;color:var(--dim)">PlayStation 5</span></th>
        <th class="th3">&#127918; Est. 3<br><span style="font-weight:400;font-size:0.52rem;color:var(--dim)">PlayStation 5</span></th>
        <th class="th4">&#128377;&#65039; Est. 4<br><span style="font-weight:400;font-size:0.52rem;color:var(--dim)">Switch 2</span></th>
      </tr></thead>
      <tbody id="gb"></tbody>
    </table>
  </div>
</div>

<script>
var URL = 'https://script.google.com/macros/s/AKfycbzdpGv3U3v2oANEUIHAfhrcvB_TUvkP6BBIgOaCz-M_oHWAuJixzUgweLfuH5lG03z3/exec';
var HOURS = [15,16,17,18,19,20,21,22,23];
var DIAS = ['Dom','Lun','Mar','Mi\u00e9','Jue','Vie','S\u00e1b'];
var ESTS = [
  'PlayStation 5 \u2014 Estaci\u00f3n 1',
  'PlayStation 5 \u2014 Estaci\u00f3n 2',
  'PlayStation 5 \u2014 Estaci\u00f3n 3',
  'Nintendo Switch 2 \u2014 Estaci\u00f3n 4'
];
var data = [];
var gDate = new Date();

function toInt(s){ return parseInt(String(s||'').replace(/[^0-9]/g,''))||0; }

function parseH(h){
  var m = String(h||'').match(/(\d+)\/(\d+)\/(\d+)[^0-9]+(\d+):00[^0-9]+(\d+):00/);
  if(!m) return null;
  return {d:m[1],mo:m[2],y:m[3],s:parseInt(m[4]),e:parseInt(m[5])};
}

function ds(date){ return date.getDate()+'/'+(date.getMonth()+1)+'/'+date.getFullYear(); }

function loadData(){
  document.getElementById('sub').textContent='Actualizando...';
  var t=Date.now(), s=document.createElement('script');
  s.src=URL+'?getAllReservas=1&callback=cb'+t+'&t='+t;
  window['cb'+t]=function(d){
    data=Array.isArray(d)?d:[];
    render();
    document.getElementById('sub').textContent='Actualizado: '+new Date().toLocaleTimeString('es-AR');
    delete window['cb'+t]; s.remove();
  };
  s.onerror=function(){ document.getElementById('sub').textContent='Error'; s.remove(); };
  document.body.appendChild(s);
}

function render(){
  var today=ds(new Date()), dstr=ds(gDate), isHoy=dstr===today;

  var dia=data.filter(function(r){
    var p=parseH(r.horario);
    return p && (p.d+'/'+p.mo+'/'+p.y)===dstr;
  });

  document.getElementById('st').textContent=data.length;
  document.getElementById('sh').textContent=dia.length;
  document.getElementById('si').textContent='$'+data.reduce(function(a,r){return a+toInt(r.total);},0).toLocaleString('es-AR');
  document.getElementById('sih').textContent='$'+dia.reduce(function(a,r){return a+toInt(r.total);},0).toLocaleString('es-AR');
  document.getElementById('lh').textContent=isHoy?'Reservas hoy':'Reservas '+dstr;
  document.getElementById('lih').textContent=isHoy?'Ingresos hoy':'Ingresos '+dstr;

  var now=new Date();
  var mesActual=now.getMonth(), anioActual=now.getFullYear();
  var MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var mes=data.filter(function(r){
    var p=parseH(r.horario);
    if(!p) return false;
    return parseInt(p.mo)-1===mesActual && parseInt(p.y)===anioActual;
  });
  document.getElementById('smes').textContent=mes.length;
  document.getElementById('sgmes').textContent='$'+mes.reduce(function(a,r){return a+toInt(r.total);},0).toLocaleString('es-AR');
  document.getElementById('lmes').textContent='Reservas '+MESES[mesActual];
  document.getElementById('lgmes').textContent='Ganancia '+MESES[mesActual];
  document.getElementById('dlbl').textContent=DIAS[gDate.getDay()]+' '+dstr;

  var bk=[[],[],[],[]];
  data.forEach(function(r){
    var p=parseH(r.horario);
    if(!p) return;
    if((p.d+'/'+p.mo+'/'+p.y)!==dstr) return;
    var si=ESTS.indexOf(r.consola);
    if(si<0) return;
    bk[si].push({s:p.s,e:p.e,
      nom:(String(r.nombre||'')+' '+String(r.apellido||'')).trim(),
      jug:String(r.jugadores||''),tot:String(r.total||'')});
  });

  var tb=document.getElementById('gb');
  tb.innerHTML='';
  HOURS.forEach(function(h){
    var tr=document.createElement('tr');
    var td0=document.createElement('td');
    td0.textContent=h+':00'; tr.appendChild(td0);
    for(var si=0;si<4;si++){
      var td=document.createElement('td'), n=si+1, bkg=null;
      for(var i=0;i<bk[si].length;i++){
        if(h>=bk[si][i].s && h<bk[si][i].e){bkg=bk[si][i];break;}
      }
      if(bkg){
        if(h===bkg.s){
          td.innerHTML='<div class="cb cb'+n+'">'
            +'<div class="bn">'+bkg.nom+'</div>'
            +'<div class="bt">&#9201; '+bkg.s+':00 &rarr; '+bkg.e+':00 ('+(bkg.e-bkg.s)+' hr)</div>'
            +'<div class="bd">'+bkg.jug+' &middot; '+bkg.tot+'</div>'
            +'</div>';
        } else {
          td.innerHTML='<div class="cc cc'+n+'"><div class="bcl">&#8593; '+bkg.nom+' (hasta '+bkg.e+':00)</div></div>';
        }
      } else {
        td.innerHTML='<div class="cfree">&mdash;</div>';
      }
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
}

function changeDay(d){ gDate=new Date(gDate); gDate.setDate(gDate.getDate()+d); render(); }
function goToday(){ gDate=new Date(); render(); }

loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
